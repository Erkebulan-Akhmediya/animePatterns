services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest-2026-02-23
    ports:
      - "1935:1935"   # RTMP port
      - "8080:8080"   # HTTP port for the HLS player
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./hls:/var/www/html/stream/hls
    extra_hosts:
      - "host.docker.internal:host-gateway"